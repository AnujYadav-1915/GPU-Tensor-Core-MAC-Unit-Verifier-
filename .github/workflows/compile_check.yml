name: SystemVerilog Compilation CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verilator_check:
    name: Compile & Lint Check (Verilator)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Install Verilator Compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y verilator

    - name: Run SystemVerilog Linting & Compilation
      run: |
        verilator --lint-only -Wall \
          rtl/mac_unit.sv \
          tb/mac_sva.sv \
          tb/mac_bind.sv
